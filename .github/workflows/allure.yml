name: Playwright Tests

on:
  # Запуск вручную через GitHub UI с выбором сайта
  workflow_dispatch:
    inputs:
      site:
        description: 'Домен сайта (оставьте пустым для всех)'
        required: false
        default: ''

  # Запуск автоматически по расписанию (каждый день в 9:00 UTC)
  schedule:
    - cron: '0 9 * * *'

  # Запуск при каждом пуше в main/master
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: |
          pip install pytest pytest-playwright allure-pytest
          playwright install chromium
          playwright install-deps chromium

      - name: Запуск тестов (один сайт)
        if: ${{ github.event.inputs.site != '' }}
        run: |
          pytest test_universal2.py \
            --site=${{ github.event.inputs.site }} \
            --alluredir=allure-results \
            --timeout=300 \
            -s
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true

      - name: Запуск тестов (все сайты)
        if: ${{ github.event.inputs.site == '' }}
        run: |
          pytest test_universal2.py \
            --alluredir=allure-results \
            --timeout=300 \
            -s
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true

      - name: Сохранить результаты Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Генерация Allure отчёта
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Публикация отчёта на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
