name: Playwright Tests

on:
  # Запуск вручную через GitHub UI с выбором сайта
  workflow_dispatch:
    inputs:
      site:
        description: 'Домен сайта (оставьте пустым для всех)'
        required: false
        default: ''
      run_place_variants:
        description: 'Запускать второй прогон Place-вариантов после успешного core'
        required: false
        default: true
        type: boolean
      run_extra_checks:
        description: 'Запустить дополнительный профиль (firefox + adblock-mvp) отдельным блоком'
        required: false
        default: false
        type: boolean

  # Запуск автоматически по расписанию (каждый день в 9:00 UTC)
  schedule:
    - cron: '0 5 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка Python-зависимостей
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest playwright pytest-playwright allure-pytest pytest-timeout requests
          python -m pip show playwright

      - name: Установка браузеров Playwright
        run: |
          set -e
          python -m playwright install chromium
          python -m playwright install-deps chromium

          if [ "${RUN_EXTRA_CHECKS_INPUT}" = "true" ]; then
            python -m playwright install firefox
            python -m playwright install-deps firefox
          fi
        env:
          RUN_EXTRA_CHECKS_INPUT: ${{ github.event.inputs.run_extra_checks }}

      - name: Проверка импорта playwright
        run: python -c "from playwright.sync_api import Page; print('playwright OK')"

      - name: Запуск тестов Core (чистый профиль)
        id: run_tests_core
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-core
            --timeout=600
            -s
            --service-mode=core
            --browser=chromium
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running CORE (clean profile): chromium + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Place Variants (чистый профиль)
        id: run_tests_variants
        if: ${{ always() && steps.run_tests_core.outcome == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_place_variants == 'true') }}
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-variants
            --timeout=600
            -s
            --service-mode=variants
            --browser=chromium
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running VARIANTS (clean profile): chromium + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Core (доп профиль: firefox + adblock)
        id: run_tests_core_extra
        if: ${{ always() && steps.run_tests_core.outcome == 'success' && github.event.inputs.run_extra_checks == 'true' }}
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-core-extra
            --timeout=600
            -s
            --service-mode=core
            --browser=firefox
            --blocking-profile=adblock-mvp
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running CORE (extra profile): firefox + adblock-mvp"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Place Variants (доп профиль: firefox + adblock)
        id: run_tests_variants_extra
        if: ${{ always() && steps.run_tests_core_extra.outcome == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_place_variants == 'true') }}
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-variants-extra
            --timeout=600
            -s
            --service-mode=variants
            --browser=firefox
            --blocking-profile=adblock-mvp
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running VARIANTS (extra profile): firefox + adblock-mvp"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Объединить результаты Allure
        if: always()
        run: |
          mkdir -p allure-results
          if [ -d allure-results-core ]; then
            cp -R allure-results-core/. allure-results/
          fi
          if [ -d allure-results-variants ]; then
            cp -R allure-results-variants/. allure-results/
          fi
          if [ -d allure-results-core-extra ]; then
            cp -R allure-results-core-extra/. allure-results/
          fi
          if [ -d allure-results-variants-extra ]; then
            cp -R allure-results-variants-extra/. allure-results/
          fi

      - name: Сохранить результаты Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Генерация Allure отчёта
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Собрать сообщение для Telegram из Allure
        if: always()
        run: python notify_from_allure.py
        env:
          ALLURE_RESULTS_DIR: allure-results
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLURE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          SITE_HINT: ${{ github.event.inputs.site }}
          NOTIFY_STATE_FILE: notify_state.json
          NOTIFY_STATE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/notify_state.json

      - name: Проверить, нужно ли слать алерт
        if: always()
        id: telegram_check
        run: echo "should_send=$(cat telegram_should_send.txt)" >> $GITHUB_OUTPUT

      - name: Отправить Telegram alert
        if: ${{ always() && steps.telegram_check.outputs.should_send == '1' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text@telegram_message.txt"

      - name: Добавить state алертов в Allure publish
        if: always()
        run: |
          if [ -f notify_state.json ] && [ -d allure-report ]; then
            cp notify_state.json allure-report/notify_state.json
          fi

      - name: Публикация отчёта на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
