name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Домен сайта (оставьте пустым для всех)'
        required: false
        default: ''
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка Python-зависимостей
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest playwright pytest-playwright allure-pytest
          python -m pip show playwright

      - name: Установка браузера Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Проверка импорта playwright
        run: python -c "from playwright.sync_api import Page; print('playwright OK')"

      - name: Запуск тестов (один сайт)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.site != '' }}
        run: |
          python -m pytest test_universal2.py \
            --site=${{ github.event.inputs.site }} \
            --alluredir=allure-results \
            --timeout=300 \
            -s
        continue-on-error: true

      - name: Запуск тестов (все сайты)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.site == '' }}
        run: |
          python -m pytest test_universal2.py \
            --alluredir=allure-results \
            --timeout=300 \
            -s
        continue-on-error: true

      - name: Сохранить результаты Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Генерация Allure отчёта
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Публикация отчёта на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
