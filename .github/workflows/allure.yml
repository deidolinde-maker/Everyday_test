name: Playwright Tests

on:
  # Запуск вручную через GitHub UI с выбором сайта
  workflow_dispatch:
    inputs:
      site:
        description: 'Домен сайта (оставьте пустым для всех)'
        required: false
        default: ''
      run_place_variants:
        description: 'Запускать прогон Place-вариантов (для включённых браузеров)'
        required: false
        default: true
        type: boolean
      run_chromium:
        description: 'Запускать clean-прогон в Chromium'
        required: false
        default: true
        type: boolean
      run_firefox:
        description: 'Запускать clean-прогон в Firefox'
        required: false
        default: false
        type: boolean
      run_webkit:
        description: 'Запускать clean-прогон в WebKit'
        required: false
        default: false
        type: boolean
      alert_errors:
        description: 'Telegram: одиночные ошибки (1–5 на лендинг)'
        required: false
        default: true
        type: boolean
      alert_aggregates:
        description: 'Telegram: накопительные/массовые ошибки'
        required: false
        default: true
        type: boolean
      alert_summary:
        description: 'Telegram: итог прогона'
        required: false
        default: true
        type: boolean
      alert_recovered:
        description: 'Telegram: блок восстановлений (исправлено)'
        required: false
        default: true
        type: boolean

  # Запуск автоматически по расписанию (каждый день в 05:00 UTC / 08:00 MSK)
  schedule:
    - cron: '0 5 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      RUN_CHROMIUM: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_chromium == 'true' }}
      RUN_FIREFOX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_firefox == 'true' }}
      RUN_WEBKIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_webkit == 'true' }}
      RUN_PLACE_VARIANTS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_place_variants == 'true' }}
      ALERT_ERRORS_ENABLED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.alert_errors == 'true' }}
      ALERT_AGGREGATES_ENABLED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.alert_aggregates == 'true' }}
      ALERT_SUMMARY_ENABLED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.alert_summary == 'true' }}
      ALERT_RECOVERED_ENABLED: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.alert_recovered == 'true' }}

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка Python-зависимостей
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest playwright pytest-playwright allure-pytest pytest-timeout requests
          python -m pip show playwright

      - name: Проверка выбора браузеров
        run: |
          set -e
          echo "RUN_CHROMIUM=${RUN_CHROMIUM}"
          echo "RUN_FIREFOX=${RUN_FIREFOX}"
          echo "RUN_WEBKIT=${RUN_WEBKIT}"
          echo "RUN_PLACE_VARIANTS=${RUN_PLACE_VARIANTS}"
          if [ "${RUN_CHROMIUM}" != "true" ] && [ "${RUN_FIREFOX}" != "true" ] && [ "${RUN_WEBKIT}" != "true" ]; then
            echo "::error::Выберите хотя бы один браузер (run_chromium/run_firefox/run_webkit)."
            exit 1
          fi

      - name: Установка браузеров Playwright
        run: |
          set -e
          if [ "${RUN_CHROMIUM}" = "true" ]; then
            python -m playwright install chromium
            python -m playwright install-deps chromium
          fi
          if [ "${RUN_FIREFOX}" = "true" ]; then
            python -m playwright install firefox
            python -m playwright install-deps firefox
          fi
          if [ "${RUN_WEBKIT}" = "true" ]; then
            python -m playwright install webkit
            python -m playwright install-deps webkit
          fi

      - name: Проверка импорта playwright
        run: python -c "from playwright.sync_api import Page; print('playwright OK')"

      - name: Запуск тестов Core (chromium, чистый профиль)
        id: run_tests_core_chromium
        if: ${{ always() && env.RUN_CHROMIUM == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-core-chromium
            --timeout=600
            -s
            --service-mode=core
            --browser=chromium
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running CORE (clean profile): chromium + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Core (firefox, чистый профиль)
        id: run_tests_core_firefox
        if: ${{ always() && env.RUN_FIREFOX == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-core-firefox
            --timeout=600
            -s
            --service-mode=core
            --browser=firefox
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running CORE (clean profile): firefox + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Core (webkit, чистый профиль)
        id: run_tests_core_webkit
        if: ${{ always() && env.RUN_WEBKIT == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-core-webkit
            --timeout=600
            -s
            --service-mode=core
            --browser=webkit
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running CORE (clean profile): webkit + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Place Variants (chromium, чистый профиль)
        id: run_tests_variants_chromium
        if: ${{ always() && env.RUN_CHROMIUM == 'true' && env.RUN_PLACE_VARIANTS == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-variants-chromium
            --timeout=600
            -s
            --service-mode=variants
            --browser=chromium
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running VARIANTS (clean profile): chromium + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Place Variants (firefox, чистый профиль)
        id: run_tests_variants_firefox
        if: ${{ always() && env.RUN_FIREFOX == 'true' && env.RUN_PLACE_VARIANTS == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-variants-firefox
            --timeout=600
            -s
            --service-mode=variants
            --browser=firefox
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running VARIANTS (clean profile): firefox + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Запуск тестов Place Variants (webkit, чистый профиль)
        id: run_tests_variants_webkit
        if: ${{ always() && env.RUN_WEBKIT == 'true' && env.RUN_PLACE_VARIANTS == 'true' }}
        timeout-minutes: 100
        run: |
          set -e
          PYTEST_ARGS=(
            test_universal2.py
            --alluredir=allure-results-variants-webkit
            --timeout=600
            -s
            --service-mode=variants
            --browser=webkit
            --blocking-profile=none
          )
          if [ -n "${SITE_INPUT}" ]; then
            PYTEST_ARGS+=(--site="${SITE_INPUT}")
          fi
          echo "Running VARIANTS (clean profile): webkit + no blockers"
          echo "Pytest args: ${PYTEST_ARGS[*]}"
          python -m pytest "${PYTEST_ARGS[@]}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_INPUT: ${{ github.event.inputs.site }}
        continue-on-error: true

      - name: Объединить результаты Allure
        if: always()
        run: |
          mkdir -p allure-results
          if [ -d allure-results-core-chromium ]; then
            cp -R allure-results-core-chromium/. allure-results/
          fi
          if [ -d allure-results-variants-chromium ]; then
            cp -R allure-results-variants-chromium/. allure-results/
          fi
          if [ -d allure-results-core-firefox ]; then
            cp -R allure-results-core-firefox/. allure-results/
          fi
          if [ -d allure-results-variants-firefox ]; then
            cp -R allure-results-variants-firefox/. allure-results/
          fi
          if [ -d allure-results-core-webkit ]; then
            cp -R allure-results-core-webkit/. allure-results/
          fi
          if [ -d allure-results-variants-webkit ]; then
            cp -R allure-results-variants-webkit/. allure-results/
          fi

      - name: Сохранить результаты Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Генерация Allure отчёта
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Собрать сообщение для Telegram из Allure
        if: always()
        run: python notify_from_allure.py
        env:
          ALLURE_RESULTS_DIR: allure-results
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLURE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          SITE_HINT: ${{ github.event.inputs.site }}
          NOTIFY_STATE_FILE: notify_state.json
          NOTIFY_STATE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/notify_state.json
          ALERT_ERRORS_ENABLED: ${{ env.ALERT_ERRORS_ENABLED }}
          ALERT_AGGREGATES_ENABLED: ${{ env.ALERT_AGGREGATES_ENABLED }}
          ALERT_SUMMARY_ENABLED: ${{ env.ALERT_SUMMARY_ENABLED }}
          ALERT_RECOVERED_ENABLED: ${{ env.ALERT_RECOVERED_ENABLED }}

      - name: Проверить, нужно ли слать алерт
        if: always()
        id: telegram_check
        run: echo "should_send=$(cat telegram_should_send.txt)" >> $GITHUB_OUTPUT

      - name: Отправить Telegram alert
        if: ${{ always() && steps.telegram_check.outputs.should_send == '1' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text@telegram_message.txt"

      - name: Подготовить директорию публикации отчёта
        if: always()
        run: |
          mkdir -p allure-publish
          if [ -d allure-report ]; then
            cp -R allure-report/. allure-publish/
          fi
          if [ -f notify_state.json ]; then
            cp notify_state.json allure-publish/notify_state.json || true
          fi

      - name: Публикация отчёта на GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-publish
