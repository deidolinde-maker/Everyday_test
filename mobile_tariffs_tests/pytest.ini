[pytest]
# Настройки Pytest для проекта mobile_tariffs_tests

addopts =
    # Подробный вывод: имя теста + результат
    -v
    # Allure: папка для результатов (используется allure serve / allure generate)
    --alluredir=allure-results
    # Продолжать прогон даже при падениях
    --tb=short

# Маркеры
markers =
    mobile_tariffs: Тесты проверки блока мобильных тарифов на лендингах

# Таймаут одного теста (секунд). Требует pytest-timeout.
# timeout = 120

testpaths =
    tests
